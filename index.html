<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arras.io Tank Growth Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f1f2f6;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // Player State starting at Level 1
    const player = {
        x: 0, 
        y: 0,
        level: 1,
        maxLevel: 45,
        xp: 0,
        xpNeeded: 100,
        
        // Base stats at level 1
        baseRadius: 15,
        baseBarrelWidth: 12,
        baseBarrelLength: 30,
        baseBulletLife: 40, // Range is dictated by bullet lifetime frames
        
        // Dynamic scaled stats
        radius: 15,
        barrelWidth: 12,
        barrelLength: 30,
        bulletLife: 40,
        speed: 5,
        
        angle: 0,
        color: "#00b2ee",       
        barrelColor: "#999999", 
        strokeColor: "#555555", 
        strokeWidth: 4,
        shootCooldown: 0,
        cooldownMax: 15
    };

    // Camera object tracking the player
    const camera = { x: 0, y: 0 };

    // Control States
    const keys = { w: false, a: false, s: false, d: false };
    let mouse = { x: 0, y: 0 };
    let isMouseDown = false;
    let autoShoot = false;

    // Bullet storage array
    const bullets = [];

    // Keyboard Listeners
    window.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();
        if (key in keys) keys[key] = true;
        if (key === 'e') autoShoot = !autoShoot;
        if (key === ' ') isMouseDown = true; 
    });

    window.addEventListener("keyup", (e) => {
        const key = e.key.toLowerCase();
        if (key in keys) keys[key] = false;
        if (key === ' ') isMouseDown = false;
    });

    window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener("mousedown", () => isMouseDown = true);
    window.addEventListener("mouseup", () => isMouseDown = false);

    // Rounded rectangle helper
    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // Recalculate stats based on level
    function updatePlayerStats() {
        if (player.level > player.maxLevel) player.level = player.maxLevel;
        
        // Progress percentage from level 1 to 45
        const progress = (player.level - 1) / (player.maxLevel - 1);
        
        // Tank grows from size 15 to 45
        player.radius = player.baseRadius + (progress * 30);
        // Barrel gets wider
        player.barrelWidth = player.baseBarrelWidth + (progress * 20);
        // Barrel gets longer (better visual reach)
        player.barrelLength = player.baseBarrelLength + (progress * 45);
        // Bullets live longer (giving them much further range)
        player.bulletLife = player.baseBulletLife + (progress * 50);
        // Thick outlines scale up slightly with size
        player.strokeWidth = 4 + (progress * 2);
        // Large tanks move slightly slower like real Arras.io mechanics
        player.speed = 5 - (progress * 1.5);
    }

    // Function to spawn bullets
    function fireBullet() {
        if (player.shootCooldown <= 0) {
            const spawnX = player.x + Math.cos(player.angle) * player.barrelLength;
            const spawnY = player.y + Math.sin(player.angle) * player.barrelLength;
            
            bullets.push({
                x: spawnX,
                y: spawnY,
                vx: Math.cos(player.angle) * 12,
                vy: Math.sin(player.angle) * 12,
                radius: player.barrelWidth * 0.5, // Bullet scales with barrel size
                color: player.color,
                life: player.bulletLife // Dynamic range based on level
            });
            player.shootCooldown = player.cooldownMax;
        }
    }

    // Game Loop
    function update() {
        // 1. Passive XP Generation to show off growth mechanics
        if (player.level < player.maxLevel) {
            player.xp += 0.5; // Gain half an XP point per frame
            if (player.xp >= player.xpNeeded) {
                player.xp = 0;
                player.level++;
                player.xpNeeded = 100 + (player.level * 15); // Higher levels need more XP
                updatePlayerStats();
            }
        }

        // 2. Move Player
        if (keys.w) player.y -= player.speed;
        if (keys.s) player.y += player.speed;
        if (keys.a) player.x -= player.speed;
        if (keys.d) player.x += player.speed;

        // 3. Center Camera on Player
        camera.x = player.x - canvas.width / 2;
        camera.y = player.y - canvas.height / 2;

        // 4. Calculate Angle
        const worldMouseX = mouse.x + camera.x;
        const worldMouseY = mouse.y + camera.y;
        player.angle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);

        // 5. Handle Weapons
        if (player.shootCooldown > 0) player.shootCooldown--;
        if (autoShoot || isMouseDown) {
            fireBullet();
        }

        // 6. Update Bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            b.life--;
            if (b.life <= 0) bullets.splice(i, 1);
        }

        // 7. RENDER SCREEN
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Draw Moving Grid Lines
        ctx.strokeStyle = "#e4e5ea";
        ctx.lineWidth = 1;
        const gridSpacing = 40;
        const startX = Math.floor(camera.x / gridSpacing) * gridSpacing;
        const endX = startX + canvas.width + gridSpacing;
        const startY = Math.floor(camera.y / gridSpacing) * gridSpacing;
        const endY = startY + canvas.height + gridSpacing;

        for (let x = startX; x < endX; x += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke();
        }
        for (let y = startY; y < endY; y += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
        }

        // Render Bullets
        ctx.strokeStyle = player.strokeColor;
        ctx.lineWidth = player.strokeWidth;
        ctx.lineJoin = "round";
        bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.stroke();
        });

        // Render Tank
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);

        // Draw Dynamic Barrel
        ctx.fillStyle = player.barrelColor;
        drawRoundedRect(ctx, 0, -player.barrelWidth / 2, player.barrelLength, player.barrelWidth, 4);
        ctx.fill();
        ctx.stroke();

        // Draw Dynamic Body Circle
        ctx.beginPath();
        ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.stroke();

        ctx.restore();
        ctx.restore();

        // 8. RENDER STATS HUD (Fixed to Screen)
        // Level Text
        ctx.fillStyle = "#555555";
        ctx.font = "bold 20px sans-serif";
        ctx.fillText(`Level ${player.level}`, 20, 40);
        
        if (autoShoot) {
            ctx.font = "14px sans-serif";
            ctx.fillText("AUTO FIRE: ON", 20, 65);
        }

        // Experience Bar Container
        const barWidth = 300;
        const barHeight = 16;
        const barX = canvas.width / 2 - barWidth / 2;
        const barY = canvas.height - 40;

        // Draw Background Bar
        ctx.fillStyle = "#e4e5ea";
        drawRoundedRect(ctx, barX, barY, barWidth, barHeight, 8);
        ctx.fill();
        ctx.strokeStyle = "#555555";
        ctx.lineWidth = 3;
        ctx.stroke();

        // Draw XP Fill (Green bar)
        if (player.level < player.maxLevel) {
            const xpPercentage = player.xp / player.xpNeeded;
            ctx.fillStyle = "#85e343";
            drawRoundedRect(ctx, barX, barY, barWidth * xpPercentage, barHeight, 8);
            ctx.fill();
        } else {
            // MAX LEVEL FILL
            ctx.fillStyle = "#ffd700"; // Gold fill
            drawRoundedRect(ctx, barX, barY, barWidth, barHeight, 8);
            ctx.fill();
            ctx.fillStyle = "#555555";
            ctx.font = "bold 11px sans-serif";
            ctx.fillText("MAX LEVEL", barX + barWidth / 2 - 30, barY + 12);
        }

        requestAnimationFrame(update);
    }

    // Initialize stats
    updatePlayerStats();
    requestAnimationFrame(update);
</script>

</body>
</html>
