<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arras.io Tank Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f1f2f6; /* Classic arras grid background color */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Handle resizing
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // Game state
    const player = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        radius: 30,
        speed: 4,
        angle: 0,
        barrelWidth: 24,
        barrelLength: 45,
        // Colors from Arras.io theme
        color: "#00b2ee",       // Deep sky blue tank body
        barrelColor: "#999999", // Dark grey barrel
        strokeColor: "#555555", // Outlines
        strokeWidth: 4          // Thick outlines
    };

    // Controls
    const keys = { w: false, a: false, s: false, d: false };
    const mouse = { x: 0, y: 0 };

    window.addEventListener("keydown", (e) => { if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
    window.addEventListener("keyup", (e) => { if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });
    window.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    // Round edges rendering helper
    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // Main Game Loop
    function update() {
        // Move Player
        if (keys.w) player.y -= player.speed;
        if (keys.s) player.y += player.speed;
        if (keys.a) player.x -= player.speed;
        if (keys.d) player.x += player.speed;

        // Calculate Angle to Mouse
        player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

        // Clear Screen
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Grid Lines (Arras style background)
        ctx.strokeStyle = "#e4e5ea";
        ctx.lineWidth = 1;
        const gridSpacing = 40;
        for (let x = 0; x < canvas.width; x += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // Render Tank Group
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);

        // 1. Draw Barrel (with rounded corners at tip)
        ctx.fillStyle = player.barrelColor;
        ctx.strokeStyle = player.strokeColor;
        ctx.lineWidth = player.strokeWidth;
        ctx.lineJoin = "round"; // Forces rounded vector joins

        // Barrel extends rightward relative to rotation
        // Draw outline and fill simultaneously using the helper function
        drawRoundedRect(ctx, 0, -player.barrelWidth / 2, player.barrelLength, player.barrelWidth, 4);
        ctx.fill();
        ctx.stroke();

        // 2. Draw Body Circle (with thick dark outline)
        ctx.beginPath();
        ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.stroke();

        ctx.restore();

        requestAnimationFrame(update);
    }

    // Start game loop
    requestAnimationFrame(update);
</script>

</body>
</html>
