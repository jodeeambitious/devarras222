<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arras.io Tank Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f1f2f6;
            font-family: sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // Player State
    const player = {
        x: 0, 
        y: 0,
        vx: 0, // Velocity X for recoil physics
        vy: 0, // Velocity Y for recoil physics
        level: 1,
        maxLevel: 45,
        score: 0,
        
        // Base stats at level 1
        baseRadius: 15,
        baseBarrelWidth: 12,
        baseBarrelLength: 30,
        baseBulletLife: 40,
        
        // Dynamic scaled stats
        radius: 15,
        barrelWidth: 12,
        barrelLength: 30,
        bulletLife: 40,
        speed: 5,
        
        angle: 0,
        color: "#00b2ee",       
        barrelColor: "#999999", 
        strokeColor: "#555555", 
        strokeWidth: 4,
        shootCooldown: 0,
        cooldownMax: 15,

        // Animation States
        barrelOffset: 0,     // Tracks how much the barrel is pushed back (pixels)
        baseRecoilForce: 1.5, // How hard the tank body gets pushed back at level 1
        recoilForce: 1.5
    };

    // Camera tracking
    const camera = { x: 0, y: 0 };

    // Control States
    const keys = { w: false, a: false, s: false, d: false };
    let mouse = { x: 0, y: 0 };
    let isMouseDown = false;
    let autoShoot = false;

    // Bullet storage array
    const bullets = [];

    // Keyboard Listeners
    window.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();
        if (key in keys) keys[key] = true;
        if (key === 'e') autoShoot = !autoShoot;
        if (key === ' ') isMouseDown = true; 
        
        // Instantly Max Out Level by pressing N
        if (key === 'n') {
            player.level = player.maxLevel;
            player.score = 26000;
            updatePlayerStats();
        }
    });

    window.addEventListener("keyup", (e) => {
        const key = e.key.toLowerCase();
        if (key in keys) keys[key] = false;
        if (key === ' ') isMouseDown = false;
    });

    window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener("mousedown", () => isMouseDown = true);
    window.addEventListener("mouseup", () => isMouseDown = false);

    // Rounded rectangle helper
    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // Scale attributes based on current level
    function updatePlayerStats() {
        const progress = (player.level - 1) / (player.maxLevel - 1);
        
        player.radius = player.baseRadius + (progress * 30);
        player.barrelWidth = player.baseBarrelWidth + (progress * 20);
        player.barrelLength = player.baseBarrelLength + (progress * 45);
        player.bulletLife = player.baseBulletLife + (progress * 50);
        player.strokeWidth = 4 + (progress * 2);
        player.speed = 5 - (progress * 1.5);
        // Recoil force scales up as you level up and bullets get larger
        player.recoilForce = player.baseRecoilForce + (progress * 2.5);
    }

    // Function to spawn bullets and trigger recoil animation
    function fireBullet() {
        if (player.shootCooldown <= 0) {
            // Calculate spawn position using animated barrel length
            const currentBarrelLength = player.barrelLength - player.barrelOffset;
            const spawnX = player.x + Math.cos(player.angle) * currentBarrelLength;
            const spawnY = player.y + Math.sin(player.angle) * currentBarrelLength;
            
            bullets.push({
                x: spawnX,
                y: spawnY,
                vx: Math.cos(player.angle) * 12,
                vy: Math.sin(player.angle) * 12,
                radius: player.barrelWidth * 0.5, 
                color: player.color,
                life: player.bulletLife 
            });

            // 1. Barrel Recoil Animation: Snap barrel backward instantly
            player.barrelOffset = player.barrelLength * 0.35; // Pushed back 35% of total length

            // 2. Body Recoil Physics: Push tank backward away from shooting angle
            player.vx -= Math.cos(player.angle) * player.recoilForce;
            player.vy -= Math.sin(player.angle) * player.recoilForce;

            player.shootCooldown = player.cooldownMax;
        }
    }

    // Game Loop
    function update() {
        // 1. Core WASD Movement
        let moveX = 0;
        let moveY = 0;
        if (keys.w) moveY -= player.speed;
        if (keys.s) moveY += player.speed;
        if (keys.a) moveX -= player.speed;
        if (keys.d) moveX += player.speed;

        // Apply WASD movement + recoil physics velocity
        player.x += moveX + player.vx;
        player.y += moveY + player.vy;

        // Decelerate the body recoil velocity back to zero (friction)
        player.vx *= 0.85;
        player.vy *= 0.85;

        // Smoothly slide barrel back out to full length (Lerp)
        player.barrelOffset += (0 - player.barrelOffset) * 0.15;

        // 2. Center Camera on Player
        camera.x = player.x - canvas.width / 2;
        camera.y = player.y - canvas.height / 2;

        // 3. Calculate Angle
        const worldMouseX = mouse.x + camera.x;
        const worldMouseY = mouse.y + camera.y;
        player.angle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);

        // 4. Handle Weapons
        if (player.shootCooldown > 0) player.shootCooldown--;
        if (autoShoot || isMouseDown) {
            fireBullet();
        }

        // 5. Update Bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            b.life--;
            if (b.life <= 0) bullets.splice(i, 1);
        }

        // 6. RENDER SCREEN
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Draw Moving Grid Lines
        ctx.strokeStyle = "#e4e5ea";
        ctx.lineWidth = 1;
        const gridSpacing = 40;
        const startX = Math.floor(camera.x / gridSpacing) * gridSpacing;
        const endX = startX + canvas.width + gridSpacing;
        const startY = Math.floor(camera.y / gridSpacing) * gridSpacing;
        const endY = startY + canvas.height + gridSpacing;

        for (let x = startX; x < endX; x += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke();
        }
        for (let y = startY; y < endY; y += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
        }

        // Render Bullets
        ctx.strokeStyle = player.strokeColor;
        ctx.lineWidth = player.strokeWidth;
        ctx.lineJoin = "round";
        bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.stroke();
        });

        // Render Tank
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);

        // Draw Animated Barrel (Uses length minus current recoil offset)
        ctx.fillStyle = player.barrelColor;
        const animatedLength = player.barrelLength - player.barrelOffset;
        drawRoundedRect(ctx, 0, -player.barrelWidth / 2, animatedLength, player.barrelWidth, 4);
        ctx.fill();
        ctx.stroke();

        // Draw Dynamic Body Circle
        ctx.beginPath();
        ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.stroke();

        ctx.restore();
        ctx.restore();

        // 7. RENDER BOTTOM HUD (Arras.io Style Stack)
        const barWidth = 320;
        const barHeight = 14;
        const barX = canvas.width / 2 - barWidth / 2;
        const hudBottomY = canvas.height - 30; 

        // Draw XP Progress Bar Container
        ctx.fillStyle = "#e4e5ea";
        drawRoundedRect(ctx, barX, hudBottomY, barWidth, barHeight, 6);
        ctx.fill();
        ctx.strokeStyle = "#555555";
        ctx.lineWidth = 3;
        ctx.stroke();

        // Draw XP Fill
        if (player.level < player.maxLevel) {
            ctx.fillStyle = "#85e343"; 
            drawRoundedRect(ctx, barX, hudBottomY, barWidth * 0.05, barHeight, 6); 
            ctx.fill();
        } else {
            ctx.fillStyle = "#ffd700"; 
            drawRoundedRect(ctx, barX, hudBottomY, barWidth, barHeight, 6);
            ctx.fill();
        }

        // Level and Score Labels under the bar
        ctx.textAlign = "center";
        ctx.fillStyle = "#555555";
        
        // Score Line
        ctx.font = "bold 13px sans-serif";
