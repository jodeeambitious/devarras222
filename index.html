<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arras.io Tank Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f1f2f6;
            font-family: sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // Player State
    const player = {
        x: 0, 
        y: 0,
        vx: 0, 
        vy: 0, 
        level: 1,
        maxLevel: 45,
        score: 0,
        targetScore: 0, 
        
        // Solid clamped stats
        radius: 15,
        barrelWidth: 12,
        barrelLength: 35,
        bulletLife: 50,
        bulletSpeed: 12,     
        speed: 3.5,
        shootCooldown: 0,
        cooldownMax: 10,

        // Clean static lines & recoil
        strokeWidth: 2, 
        barrelOffset: 0,     
        recoilForce: 0.15
    };

    // Camera tracking
    const camera = { x: 0, y: 0 };

    // Control States
    const keys = { w: false, a: false, s: false, d: false };
    let mouse = { x: 0, y: 0 };
    let isMouseDown = false;
    let autoShoot = false;

    // Bullet storage array
    const bullets = [];

    // Keyboard Listeners
    window.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();
        if (key in keys) keys[key] = true;
        if (key === 'e') autoShoot = !autoShoot;
        if (key === ' ') isMouseDown = true; 
        
        if (key === 'n') {
            player.targetScore = 26000; // Safe direct assignment
        }
    });

    window.addEventListener("keyup", (e) => {
        const key = e.key.toLowerCase();
        if (key in keys) keys[key] = false;
        if (key === ' ') isMouseDown = false;
    });

    window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener("mousedown", () => isMouseDown = true);
    window.addEventListener("mouseup", () => isMouseDown = false);

    // Guaranteed safe rounded rectangle render helper
    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // Completely bulletproof step-by-step stat upgrading (No division equations to crash engine)
    function updatePlayerStats() {
        if (player.score >= 26000) {
            player.level = 45;
            player.radius = 45;
            player.barrelWidth = 32;
            player.barrelLength = 80;
            player.bulletLife = 180; // Massive Sniper Range
            player.bulletSpeed = 26; // Ultra Bullet Velocity
            player.cooldownMax = 2;   // Ultimate Minigun Reload Rate
            player.speed = 2.3;      // Heavy Balanced Movement Speed
            player.strokeWidth = 3;
            player.recoilForce = 0.4;
        } else {
            // Level 1 Base Values
            player.level = 1;
            player.radius = 15;
            player.barrelWidth = 12;
            player.barrelLength = 35;
            player.bulletLife = 50;
            player.bulletSpeed = 12;
            player.cooldownMax = 10;
            player.speed = 3.5;
            player.strokeWidth = 2;
            player.recoilForce = 0.15;
        }
    }

    // Function to fire bullets safely
    function fireBullet() {
        if (player.shootCooldown <= 0) {
            const currentBarrelLength = player.barrelLength - player.barrelOffset;
            const spawnX = player.x + Math.cos(player.angle) * currentBarrelLength;
            const spawnY = player.y + Math.sin(player.angle) * currentBarrelLength;
            
            bullets.push({
                x: spawnX,
                y: spawnY,
                vx: Math.cos(player.angle) * player.bulletSpeed, 
                vy: Math.sin(player.angle) * player.bulletSpeed,
                radius: player.barrelWidth * 0.45, 
                color: "#00b2ee", 
                life: player.bulletLife 
            });

            player.barrelOffset = player.barrelLength * 0.1; // Subtly back 10%
            player.vx -= Math.cos(player.angle) * player.recoilForce;
            player.vy -= Math.sin(player.angle) * player.recoilForce;

            player.shootCooldown = player.cooldownMax;
        }
    }

    // Main Run Loop
    function update() {
        // Smooth score rolling loader
        if (player.score < player.targetScore) {
            player.score += 434; // Add points evenly over 60 frames (1 second total)
            if (player.score >= player.targetScore) {
                player.score = player.targetScore;
            }
            updatePlayerStats(); 
        }

        // Apply movement engine vectors
        let moveX = 0;
        let moveY = 0;
        if (keys.w) moveY -= player.speed;
        if (keys.s) moveY += player.speed;
        if (keys.a) moveX -= player.speed;
        if (keys.d) moveX += player.speed;

        player.x += moveX + player.vx;
        player.y += moveY + player.vy;

        player.vx *= 0.85;
        player.vy *= 0.85;

        player.barrelOffset += (0 - player.barrelOffset) * 0.2;

        camera.x = Math.floor(player.x - canvas.width / 2);
        camera.y = Math.floor(player.y - canvas.height / 2);

        const worldMouseX = mouse.x + camera.x;
        const worldMouseY = mouse.y + camera.y;
        player.angle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);

        if (player.shootCooldown > 0) player.shootCooldown--;
        if (autoShoot || isMouseDown) {
            fireBullet();
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            b.life--;
            if (b.life <= 0) bullets.splice(i, 1);
        }

        // DRAW MANAGEMENT
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Grid lines setup
        ctx.strokeStyle = "#e4e5ea";
        ctx.lineWidth = 1;
        const gridSpacing = 40;
        const startX = Math.floor(camera.x / gridSpacing) * gridSpacing;
        const endX = startX + canvas.width + gridSpacing;
        const startY = Math.floor(camera.y / gridSpacing) * gridSpacing;
        const endY = startY + canvas.height + gridSpacing;

        for (let x = startX; x < endX; x += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke();
        }
        for (let y = startY; y < endY; y += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
        }

        // Render Bullets
        ctx.strokeStyle = "#555555";
        ctx.lineWidth = player.strokeWidth;
        ctx.lineJoin = "miter"; 
        bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(Math.floor(b.x), Math.floor(b.y), Math.floor(b.radius), 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.stroke();
        });

        // Render Tank Body
        ctx.save();
        ctx.translate(Math.floor(player.x), Math.floor(player.y));
        ctx.rotate(player.angle);

        ctx.fillStyle = "#999999";
        const animatedLength = player.barrelLength - player.barrelOffset;
        drawRoundedRect(ctx, 0, Math.floor(-player.barrelWidth / 2), Math.floor(animatedLength), Math.floor(player.barrelWidth), 1.5);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 0, Math.floor(player.radius), 0, Math.PI * 2);
        ctx.fillStyle = "#00b2ee";
        ctx.fill();
        ctx.stroke();

        ctx.restore();
        ctx.restore();

        // 7. RENDER BOTTOM STATUS HUD
        const barWidth = 320;
        const barHeight = 14;
        const barX = Math.floor(canvas.width / 2 - barWidth / 2);
        const hudBottomY = canvas.height - 30; 

        ctx.fillStyle = "#e4e5ea";
        drawRoundedRect(ctx, barX, hudBottomY, barWidth, barHeight, 4);
        ctx.fill();
        ctx.strokeStyle = "#555555";
        ctx.lineWidth = player.strokeWidth; 
        ctx.stroke();

        let progressPercent = Math.min(player.score / 26000, 1);
        if (player.level < player.maxLevel) {
            ctx.fillStyle = "#85e343"; 
            drawRoundedRect(ctx, barX, hudBottomY, Math.floor(barWidth * progressPercent), barHeight, 4); 
            ctx.fill();
        } else {
            ctx.fillStyle = "#ffd700"; 
            drawRoundedRect(ctx, barX, hudBottomY, barWidth, barHeight, 4);
            ctx.fill();
        }

        ctx.textAlign = "center";
        ctx.fillStyle = "#555555";
        
        ctx.font = "bold 13px sans-serif";
        ctx.fillText(`Score: ${Math.floor(player.score).toLocaleString()}`, canvas.width / 2, hudBottomY - 24);

        ctx.font = "bold 18px sans-serif";
        ctx.fillText(`Level ${player.level}`, canvas.width / 2, hudBottomY - 6);

        if (autoShoot) {
            ctx.textAlign = "left";
            ctx.font = "14px sans-serif";
