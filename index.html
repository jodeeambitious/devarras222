<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arras.io Tank Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f1f2f6;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // Player State (Longer barrel and shooting mechanics)
    const player = {
        x: 0, 
        y: 0,
        radius: 30,
        speed: 5,
        angle: 0,
        barrelWidth: 24,
        barrelLength: 60, // Made longer sticking out
        color: "#00b2ee",       
        barrelColor: "#999999", 
        strokeColor: "#555555", 
        strokeWidth: 4,
        shootCooldown: 0,
        cooldownMax: 15 // Frame count between shots
    };

    // Camera object tracking the player
    const camera = { x: 0, y: 0 };

    // Control States
    const keys = { w: false, a: false, s: false, d: false };
    let mouse = { x: 0, y: 0 };
    let isMouseDown = false;
    let autoShoot = false;

    // Bullet storage array
    const bullets = [];

    // Keyboard Listeners
    window.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();
        if (key in keys) keys[key] = true;
        
        // Toggle Auto-shoot with 'E'
        if (key === 'e') {
            autoShoot = !autoShoot;
        }
        // Shoot with Spacebar
        if (key === ' ') {
            isMouseDown = true; 
        }
    });

    window.addEventListener("keyup", (e) => {
        const key = e.key.toLowerCase();
        if (key in keys) keys[key] = false;
        if (key === ' ') isMouseDown = false;
    });

    // Mouse Listeners
    window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener("mousedown", () => isMouseDown = true);
    window.addEventListener("mouseup", () => isMouseDown = false);

    // Rounded rectangle helper
    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // Function to spawn bullets
    function fireBullet() {
        if (player.shootCooldown <= 0) {
            // Spawn bullet at tip of the barrel
            const spawnX = player.x + Math.cos(player.angle) * player.barrelLength;
            const spawnY = player.y + Math.sin(player.angle) * player.barrelLength;
            
            bullets.push({
                x: spawnX,
                y: spawnY,
                vx: Math.cos(player.angle) * 12, // Bullet speed
                vy: Math.sin(player.angle) * 12,
                radius: 12,
                color: player.color, // Match body color like arras.io
                life: 60 // Disappear after 60 frames
            });
            player.shootCooldown = player.cooldownMax;
        }
    }

    // Game Loop
    function update() {
        // 1. Move Player
        if (keys.w) player.y -= player.speed;
        if (keys.s) player.y += player.speed;
        if (keys.a) player.x -= player.speed;
        if (keys.d) player.x += player.speed;

        // 2. Center Camera on Player
        camera.x = player.x - canvas.width / 2;
        camera.y = player.y - canvas.height / 2;

        // 3. Calculate Angle toward world mouse coordinates
        const worldMouseX = mouse.x + camera.x;
        const worldMouseY = mouse.y + camera.y;
        player.angle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);

        // 4. Handle Weapon Shooting
        if (player.shootCooldown > 0) player.shootCooldown--;
        if (autoShoot || isMouseDown) {
            fireBullet();
        }

        // 5. Update Bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            b.life--;
            if (b.life <= 0) bullets.splice(i, 1);
        }

        // 6. RENDER SCREEN
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        // Shift context by negative camera positions to make everything scroll smoothly
        ctx.translate(-camera.x, -camera.y);

        // Draw Moving Grid Lines
        ctx.strokeStyle = "#e4e5ea";
        ctx.lineWidth = 1;
        const gridSpacing = 40;
        // Calculate dynamic grid starts based on camera viewport
        const startX = Math.floor(camera.x / gridSpacing) * gridSpacing;
        const endX = startX + canvas.width + gridSpacing;
        const startY = Math.floor(camera.y / gridSpacing) * gridSpacing;
        const endY = startY + canvas.height + gridSpacing;

        for (let x = startX; x < endX; x += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke();
        }
        for (let y = startY; y < endY; y += gridSpacing) {
            ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
        }

        // Render Bullets
        ctx.strokeStyle = player.strokeColor;
        ctx.lineWidth = player.strokeWidth;
        ctx.lineJoin = "round";
        bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.stroke();
        });

        // Render Tank
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);

        // Draw Barrel
        ctx.fillStyle = player.barrelColor;
        drawRoundedRect(ctx, 0, -player.barrelWidth / 2, player.barrelLength, player.barrelWidth, 4);
        ctx.fill();
        ctx.stroke();

        // Draw Body Circle
        ctx.beginPath();
        ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.stroke();

        ctx.restore(); // Restore tank transformation
        ctx.restore(); // Restore camera transformation

        // Render UI HUD (Static on top of screen)
        if (autoShoot) {
            ctx.fillStyle = "#555555";
            ctx.font = "bold 16px sans-serif";
            ctx.fillText("AUTO FIRE: ON", 20, 35);
        }

        requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
</script>

</body>
</html>
